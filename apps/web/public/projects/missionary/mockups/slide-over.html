<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>v3 · 03 — 등록자 슬라이드 오버</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-10': '#fff5f5',
            'primary-50': '#e60012',
            'primary-60': '#cc0010',
            'green-10': '#f0fdf4',
            'green-60': '#16a34a',
            'blue-10': '#eff6ff',
            'blue-60': '#2563eb',
            'warning-10': '#fffbeb',
            'warning-70': '#b45309',
            'error-60': '#ea580c',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .toggle-on {
      display: inline-flex; align-items: center; justify-content: flex-end;
      width: 40px; height: 22px; border-radius: 11px; background: #1f2937;
      padding: 2px; cursor: pointer;
    }
    .toggle-on::after { content: ''; width: 18px; height: 18px; border-radius: 50%; background: white; }
    .toggle-off {
      display: inline-flex; align-items: center; justify-content: flex-start;
      width: 40px; height: 22px; border-radius: 11px; background: #e5e7eb;
      padding: 2px; cursor: pointer;
    }
    .toggle-off::after { content: ''; width: 18px; height: 18px; border-radius: 50%; background: white; }
    .input-field {
      display: flex; height: 36px; width: 100%; align-items: center;
      border-radius: 8px; border: 1px solid #e5e7eb; background: #fff;
      padding: 0 12px; font-size: 14px; color: #111827;
    }
    .input-field.readonly { background: #f9fafb; color: #6b7280; }
    .textarea-field {
      width: 100%; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff;
      padding: 8px 12px; font-size: 14px; color: #111827; resize: none; min-height: 72px;
      font-family: inherit;
    }
    .textarea-field:focus { outline: none; border-color: #9ca3af; box-shadow: 0 0 0 1px #9ca3af; }
    .input-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    .section-divider { border: none; border-top: 1px solid #f3f4f6; margin: 16px 0; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .slide-over { animation: slideIn 0.28s ease; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1f2937; cursor: pointer; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

<div class="flex h-screen overflow-hidden">

  <!-- ============ Sidebar ============ -->
  <aside class="fixed top-0 left-0 z-30 flex flex-col w-[260px] h-screen bg-white border-r border-gray-200">
    <div class="flex items-center h-16 px-5">
      <div class="flex items-center gap-2.5">
        <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-primary-50">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5" fill-opacity="0.9"/></svg>
        </div>
        <span class="text-base font-bold text-gray-900 tracking-tight">선교 관리 시스템</span>
      </div>
    </div>
    <div class="mx-4 h-px bg-gray-200"></div>
    <nav class="flex flex-col gap-0.5 flex-1 overflow-y-auto py-4">
      <a href="#" class="relative flex items-center gap-3 h-11 mx-3 px-3 rounded-lg text-sm font-medium text-gray-500 hover:bg-gray-50"><svg class="shrink-0" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span class="truncate">선교 관리</span></a>
      <a href="01-enrollment-list.html" class="relative flex items-center gap-3 h-11 mx-3 px-3 rounded-lg text-sm font-medium bg-gray-100 text-gray-900">
        <span class="absolute left-0 top-2 bottom-2 w-[3px] rounded-r-full bg-primary-50"></span>
        <svg class="shrink-0" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="truncate">등록 관리</span>
      </a>
      <a href="#" class="relative flex items-center gap-3 h-11 mx-3 px-3 rounded-lg text-sm font-medium text-gray-500 hover:bg-gray-50"><svg class="shrink-0" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="truncate">유저 관리</span></a>
    </nav>
    <div class="border-t border-gray-200 px-4 py-4">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-9 rounded-full bg-gray-800 text-white text-sm font-semibold shrink-0">A</div>
        <div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-900 truncate">admin@missionary.org</p><p class="text-xs text-gray-400">관리자</p></div>
      </div>
    </div>
  </aside>

  <!-- ============ Main ============ -->
  <div class="ml-[260px] flex flex-1 min-h-0 relative">

    <!-- 배경 (흐릿하게) -->
    <div class="flex flex-col flex-1 overflow-hidden p-8 gap-5 opacity-40 pointer-events-none">
      <div class="flex items-start justify-between">
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center gap-1.5 text-sm text-gray-400">
            <span>등록 관리</span>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="text-gray-700 font-medium">35차 군선교</span>
          </div>
          <div class="flex items-center gap-2.5">
            <h2 class="text-lg font-semibold text-gray-900">35차 군선교</h2>
            <span class="inline-flex items-center rounded-md border border-transparent px-2.5 py-0.5 text-xs font-semibold bg-green-10 text-green-60">국내</span>
            <span class="inline-flex items-center rounded-md border border-transparent px-2.5 py-0.5 text-xs font-semibold bg-blue-10 text-blue-60">모집 중</span>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><p class="text-xs text-gray-400 mb-1">총 신청</p><p class="text-2xl font-bold text-gray-900">47명</p></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><p class="text-xs text-gray-400 mb-1">납부완료</p><p class="text-2xl font-bold text-green-60">35명</p></div>
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><p class="text-xs text-gray-400 mb-1">미납</p><p class="text-2xl font-bold text-warning-70">12명</p></div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5"><p class="text-gray-400 text-sm">테이블...</p></div>
    </div>

    <!-- 백드롭 -->
    <div class="absolute inset-0 bg-black/20 z-10"></div>

    <!-- ============ Slide-over Panel ============ -->
    <div class="slide-over absolute right-0 top-0 bottom-0 z-20 flex flex-col w-[560px] bg-white border-l border-gray-200 shadow-xl">

      <!-- 헤더 -->
      <div class="flex shrink-0 items-center justify-between border-b border-gray-200 px-4 py-3">
        <!-- 왼쪽: 닫기 버튼 + 이름 + 배지 + 서브텍스트 -->
        <div class="flex items-center gap-2 min-w-0">
          <button type="button" onclick="window.location.href='02-enrollment-detail.html'" class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-gray-500 transition-colors hover:bg-gray-50 hover:text-gray-800">
            <!-- ArrowRightFromLine -->
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 5v14"/><path d="M21 12H7"/><path d="m15 18 6-6-6-6"/></svg>
          </button>
          <div class="flex flex-col gap-0.5 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-sm font-semibold text-gray-900 truncate">홍길동</span>
              <span class="inline-flex shrink-0 items-center rounded-md border border-transparent px-2.5 py-0.5 text-xs font-semibold bg-warning-10 text-warning-70">미납</span>
            </div>
            <p class="text-xs text-gray-400 truncate">신청일: 2026.04.05 · 35차 군선교</p>
          </div>
        </div>
        <!-- 오른쪽: 이전 / 다음 / 더보기 -->
        <div class="flex shrink-0 items-center gap-0.5">
          <button type="button" class="flex h-8 w-8 items-center justify-center rounded-lg text-gray-500 transition-colors hover:bg-gray-50 hover:text-gray-800 disabled:opacity-30 disabled:pointer-events-none" disabled>
            <!-- ChevronUp — 이전 등록자 (첫 번째라 disabled) -->
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button type="button" class="flex h-8 w-8 items-center justify-center rounded-lg text-gray-500 transition-colors hover:bg-gray-50 hover:text-gray-800">
            <!-- ChevronDown — 다음 등록자 -->
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button type="button" class="flex h-8 w-8 items-center justify-center rounded-lg text-gray-500 transition-colors hover:bg-gray-50 hover:text-gray-800">
            <!-- Ellipsis — 더보기 -->
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          </button>
        </div>
      </div>

      <!-- 납부 여부 빠른 토글 — ADMIN 전용 -->
      <div class="flex items-center justify-between px-6 py-3 border-b border-gray-100 bg-gray-50">
        <div class="flex flex-col gap-0.5">
          <span class="text-xs font-medium text-gray-900">납부 여부</span>
          <span class="text-xs text-gray-400">클릭하면 즉시 반영됩니다</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-warning-70 font-medium">미납</span>
          <div class="toggle-off cursor-pointer"></div>
        </div>
      </div>

      <!-- 본문 (스크롤 가능) -->
      <div class="flex-1 overflow-y-auto">

        <!-- 참가 정보 (편집 가능) -->
        <div class="px-6 py-5">
          <p class="text-xs font-semibold text-gray-600 uppercase tracking-wider mb-3">참가 정보</p>
          <div class="flex flex-col gap-3">
            <div><label class="input-label">지역</label><select class="input-field" style="appearance:auto"><option>서울</option><option>경기</option></select></div>
            <div><label class="input-label">동행자 수</label><input type="number" class="input-field" value="2"></div>
            <div><label class="input-label">특이사항</label><textarea class="textarea-field">알레르기 있음 (땅콩)</textarea></div>
          </div>
        </div>

        <hr class="section-divider">

        <!-- 기본 정보 (읽기 전용) -->
        <div class="px-6 py-5 bg-gray-50">
          <div class="flex items-center gap-1.5 mb-3">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" class="text-gray-400 shrink-0" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <p class="text-xs font-semibold text-gray-600 uppercase tracking-wider">기본 정보</p>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="input-label">이름</label><input type="text" class="input-field readonly" value="홍길동" readonly></div>
            <div><label class="input-label">연락처</label><input type="text" class="input-field readonly" value="010-1234-5678" readonly></div>
            <div><label class="input-label">이메일</label><input type="text" class="input-field readonly" value="hong@example.com" readonly></div>
            <div><label class="input-label">교회</label><input type="text" class="input-field readonly" value="강남교회" readonly></div>
          </div>
        </div>

        <hr class="section-divider">

        <!-- 추가 신청 정보 (읽기 전용) -->
        <div class="px-6 py-5 bg-gray-50">
          <div class="flex items-center gap-1.5 mb-3">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" class="text-gray-400 shrink-0" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <p class="text-xs font-semibold text-gray-600 uppercase tracking-wider">추가 신청 정보</p>
          </div>
          <div class="flex flex-col gap-3">
            <div><label class="input-label">군 복무 부대명 <span class="text-primary-50">*</span></label><input type="text" class="input-field readonly" value="육군 1사단 3연대" readonly></div>
            <div><label class="input-label">복무 기간</label><input type="text" class="input-field readonly" value="2024.12 ~ 2026.06" readonly></div>
            <div><label class="input-label">음식 알레르기</label><input type="text" class="input-field readonly" value="땅콩" readonly></div>
          </div>
        </div>

      </div>

      <!-- 푸터 -->
      <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-gray-200 bg-white shrink-0">
        <button type="button" onclick="window.location.href='02-enrollment-detail.html'" class="inline-flex items-center h-9 px-4 rounded-lg border border-gray-300 bg-white text-gray-800 text-sm font-medium hover:bg-gray-50">취소</button>
        <button type="button" class="inline-flex items-center h-9 px-4 rounded-lg bg-gray-800 text-white text-sm font-medium hover:bg-gray-700">저장</button>
      </div>
    </div><!-- /Slide-over -->

  </div><!-- /Main -->
</div><!-- /전체 -->

</body>
</html>
